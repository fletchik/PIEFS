# Spotify Songs — 10-class music genre classification
# Audio features: acousticness, danceability, energy, tempo, valence, ... (13 total)
# Run: kaggle datasets download -d mrmorj/dataset-of-songs-in-spotify -p data/spotify
#      unzip data/spotify/dataset-of-songs-in-spotify.zip -d data/spotify
name: spotify
root: data/spotify
task: multiclass
train_fraction: 0.7
val_fraction: 0.1
standardize: true
input_dim: 13    # 12 audio features + mode
num_classes: 10
