defaults:
  - _self_
  - dataset: two_moon      # override via CLI: dataset=htru2
  - criterion: spectral
  - optimizer: adam

hydra:
  run:
    dir: ${hydra:runtime.cwd}/logs/${run_id}
  job:
    chdir: false   # keep cwd at project root so 'src.' imports resolve

run_id: ???   # required; set via CLI: run_id=exp01

trainer:
  total_steps: 60000         # fixed for all experiments
  # steps_per_function is computed in train.py as total_steps // K
  log_step: 15000            # log at 0, 15k, 30k, 45k, 60k
  save_period: 30000         # checkpoint at 30k and 60k
  batch_size: 256
  device: auto               # "cpu", "cuda", or "auto"
  seed: 42
  skip_oom: true

# Data augmentation (paper Sections 3-4, prevents overfitting of eigenfunctions)
augmentation:
  noise_std: 0.0             # Gaussian noise added to inputs: x -> x + eps, eps ~ N(0, sigma^2)
                             # Paper: "perturbation of input values can prevent overfitting"
                             # Recommended: 0.01-0.1 depending on dataset scale
  wide_normal_fraction: 0.0  # Fraction of batch replaced by wide normal points
                             # Paper: "addition of points from wide normal distribution
                             #         increases the degree of eigenfunction smoothness"
                             # Recommended: 0.1-0.3, sigma_wide auto-computed as 3x data_std

model:
  K: 6                       # number of basis functions
  hidden_dims: [64, 64, 64]  # BasisNet hidden layers
  metric_type: 'off'         # quoted: bare 'off' is parsed as bool False in YAML
  metric_hidden_dims: [64, 64]
  task: binary               # "binary" or "multiclass"

writer:
  project_name: efdo-ai4physics   # WandB project name
  mode: online                    # "online" | "offline" | "disabled"
  # Optional overrides (auto-derived from dataset+metric_type+seed if null):
  entity: null          # WandB username or team (null = personal account)
  run_name: null        # Human-readable name shown in WandB UI
  tags: null            # List of tags; null → auto: [dataset, metric, K, seed]
  notes: null           # Free-text notes attached to the run

# Graph Laplacian pretraining (paper Section 2.4); false by default
pretrain:
  graph_laplacian: false
  n_points: 1000
  k_neighbors: 10
  sigma: null
  distill_steps: 2000
  distill_lr: 0.001
  update_t_class: true
